[build]
builder = "dockerfile"
context = "."

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "postgres"
image = "postgres:15"
environment = {
  POSTGRES_DB = "prompts",
  POSTGRES_USER = "postgres",
  POSTGRES_PASSWORD = "postgres"
}
volumes = ["postgres_data:/var/lib/postgresql/data"]
port = 5432

[[services]]
name = "redis"
image = "redis:7"
volumes = ["redis_data:/data"]
port = 6379

[[services]]
name = "backend"
dockerfile = "./backend/Dockerfile"
port = 8000
environment = {
  DEBUG = "False",
  SECRET_KEY = "${SECRET_KEY}",
  ALLOWED_HOSTS = "${ALLOWED_HOSTS}",
  DB_NAME = "prompts",
  DB_USER = "postgres",
  DB_PASSWORD = "${DB_PASSWORD}",
  DB_HOST = "postgres",
  DB_PORT = "5432",
  REDIS_HOST = "redis",
  REDIS_PORT = "6379"
}
startCommand = "sh -c 'python manage.py migrate && python manage.py runserver 0.0.0.0:8000'"

[[services]]
name = "frontend"
dockerfile = "./frontend/frontend-app/Dockerfile"
port = 80
environment = {
  BACKEND_URL = "${BACKEND_URL}"
}
